<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link href="https://fonts.cdnfonts.com/css/now" rel="stylesheet">
      <link rel="stylesheet" href="write_news.css"></link>
    </head>
    <body onload="auth_check()">
        <section class="top" id="top">
            <img src="012.jpg"><h1>東京都立大学航空部 ブログ投稿ページ</h1>
        </section>
        <section class="pre" id="pre">
            <h1>編集ページ</h1>
            <div class="head_area" id="head_area">
                
                <div class="art_ti" id="art_ti">
                    <p>記事名</p>
                    <input type="text" id="art_ti_in"class="mendoi" value="">
                </div>
                <div class="art_ti" id="art_ti">
                    <p>合宿期間</p>
                    <input type="date" id="art_date_from" value="">
                    <small>から</small>
                    <input type="date" id="art_date_to" value="">
                    <small>まで</small>
                </div>
                <div class="art_ti" id="art_ti">
                    <p>掲載日</p>
                    <input type="date" id="art_date_post" value="">
                </div>                
            </div>
            <div class="body" id="body">
                <h2>本文記述</h2>
                <textarea id="text_write" value=""></textarea>
                <div class="btt" id="vtt">
                <h3>テキスト追加</h3>
                <button id="set_text">＞</button>
                </div>
                
                <h2>画像</h2>
                <input type="file" id="up_pic">
                <div class="btt" id="btt">
                <h3>画像追加</h3>
                <button id="set_pic">＞</button>
                </div>
            </div>
        </section>
        <section class="result" id="result">
            <h1>完成ページ <pre onclick="check()">次へ</pre></h1>
            <header class="post-info">
                <h2 class="post-title" id="post-title"></h2>
                <p class="post-date" id="post-date"><span></span></p>
                <p class="post-cat" id="post-cat"></p>
            </header>
            <div class="insert_area" id="insert_area"></div>
        </section>
        <section class="check" id="check">
            <h1>投稿ページ<div class="pres" id="pres"><pre onclick="back()">戻る</pre><pre onclick="send_check()">投稿</pre></div></h1>
                <h2 class="post-title" id="title_check"></h2>
                <p class="post-date" id="date_check"><span></span></p>
                <p class="post-cat" id="post_date_check"></p>
            <div class="body_check" id="body_check">

            </div>
        </section>
        <button onclick="pre_send()">send</button>
        <script src="write_news.js"></script>
    </body>
</html>
