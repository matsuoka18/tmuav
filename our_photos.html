<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body onload="start()">
        <style>
            ::-webkit-scrollbar {
             height:0px;   /* 横スクロールなら height */
            }
            body{
                width:1000000vw;
                height: min-content;
                /*さすがに計算*/
                margin:0;
                padding: 0;
            }
            img{
                height: 90vh;
                width:auto;
                margin:0;
                padding:0;
                display: inline-block;
                border-radius: 30px;
            }
        </style>
        <div id="ph">
        </div>
        <img src="./images/img1.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <img src="./images/home-bg.jpg" id="">
        <script>
            function start(){
              var num = 23;
                for(var i = 1; i < num; i++){
                  var text = '<img src="./images/img'+i+'.JPG">';
                  document.getElementById("ph").insertAdjacentHTML("beforeend",text);
                }
            }
        </script>
    </body>
</html>
